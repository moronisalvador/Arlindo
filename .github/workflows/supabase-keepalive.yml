name: Supabase keep-alive

# Supabase free-tier projects pause after ~1 week of inactivity. A weekly REST
# ping keeps the Arlindo project awake so it never sleeps between the dad's uses.
on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (anon key is public; RLS protects data)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://xqavrwmnryvfsxfikcqr.supabase.co/rest/v1/" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxYXZyd21ucnl2ZnN4ZmlrY3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODQ1MzksImV4cCI6MjA5OTk2MDUzOX0.2jHUhYeQeHYqKZURbU4EOA_9gqhWQE2WbzEheWyLb_s")
          echo "Supabase responded: $code"
